<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>typer — a typing test that shows your rhythm</title>
<meta name="description" content="A minimalist typing speed test. Type. See your words-per-minute, accuracy, and the rhythm fingerprint of your keystrokes.">
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231F3AB8'/%3E%3Crect x='14' y='7' width='4' height='18' fill='%23F4EFE3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F4EFE3;
    --paper-2: #EBE5D5;
    --ink: #17140F;
    --ink-muted: #A39C89;
    --ink-faint: #D6CFBC;
    --accent: #1F3AB8;
    --accent-soft: rgba(31, 58, 184, 0.10);
    --error: #B72B2B;
    --error-soft: rgba(183, 43, 43, 0.14);
    --radius: 4px;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --serif: "Fraunces", "Iowan Old Style", Georgia, serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #100E0A;
      --paper-2: #191510;
      --ink: #EFE9D6;
      --ink-muted: #5B564A;
      --ink-faint: #2A251D;
      --accent: #8CA2FF;
      --accent-soft: rgba(140, 162, 255, 0.12);
      --error: #E37070;
      --error-soft: rgba(227, 112, 112, 0.16);
    }
  }
  :root[data-theme="light"] {
    --paper: #F4EFE3; --paper-2: #EBE5D5; --ink: #17140F;
    --ink-muted: #A39C89; --ink-faint: #D6CFBC;
    --accent: #1F3AB8; --accent-soft: rgba(31, 58, 184, 0.10);
    --error: #B72B2B; --error-soft: rgba(183, 43, 43, 0.14);
  }
  :root[data-theme="dark"] {
    --paper: #100E0A; --paper-2: #191510; --ink: #EFE9D6;
    --ink-muted: #5B564A; --ink-faint: #2A251D;
    --accent: #8CA2FF; --accent-soft: rgba(140, 162, 255, 0.12);
    --error: #E37070; --error-soft: rgba(227, 112, 112, 0.16);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 40px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }
  .brand {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .brand .dot { color: var(--accent); }
  .brand .cursor {
    display: inline-block;
    width: 2px;
    height: 0.9em;
    background: var(--accent);
    vertical-align: -0.05em;
    margin-left: 2px;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .top-controls {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-muted);
  }
  .duration {
    display: flex;
    gap: 2px;
    background: var(--paper-2);
    padding: 3px;
    border-radius: var(--radius);
  }
  .duration button {
    font: inherit;
    color: var(--ink-muted);
    background: transparent;
    border: 0;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: color .15s, background .15s;
  }
  .duration button:hover { color: var(--ink); }
  .duration button.active {
    background: var(--paper);
    color: var(--ink);
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .theme-toggle {
    background: transparent;
    border: 0;
    color: var(--ink-muted);
    cursor: pointer;
    font: inherit;
    padding: 6px 8px;
    border-radius: 3px;
    transition: color .15s;
  }
  .theme-toggle:hover { color: var(--ink); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px 40px 60px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* The typing area */
  .stage {
    width: 100%;
    max-width: 820px;
    position: relative;
  }
  .live-stats {
    display: flex;
    gap: 28px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 26px;
    height: 22px;
    align-items: baseline;
    opacity: 0;
    transition: opacity .3s;
  }
  .live-stats.on { opacity: 1; }
  .live-stats .val {
    color: var(--accent);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    margin-right: 4px;
  }

  .text-window {
    height: calc(22px * 1.7 * 3);
    overflow: hidden;
    position: relative;
    font-family: var(--mono);
    font-size: 22px;
    line-height: 1.7;
    letter-spacing: 0.01em;
    color: var(--ink-muted);
    user-select: none;
    -webkit-user-select: none;
    /* soft top/bottom fade */
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 12%, #000 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 12%, #000 88%, transparent 100%);
  }
  .text-flow {
    transition: transform .18s ease;
    will-change: transform;
  }
  .text-flow .word { display: inline-block; margin-right: 0.4em; }
  .text-flow .ch { position: relative; transition: color .05s; }
  .text-flow .ch.done { color: var(--ink); }
  .text-flow .ch.bad { color: var(--error); background: var(--error-soft); border-radius: 2px; }
  .text-flow .ch.cur::before {
    content: "";
    position: absolute;
    left: -2px;
    top: 0.05em;
    bottom: 0.05em;
    width: 2px;
    background: var(--accent);
    animation: blink 1s steps(2) infinite;
  }
  .text-flow .ch.cur.after::before { left: auto; right: -2px; }

  .controls-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin-top: 34px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-muted);
  }
  .btn {
    font: inherit;
    color: var(--ink-muted);
    background: transparent;
    border: 1px solid var(--ink-faint);
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { color: var(--ink); border-color: var(--ink-muted); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn .kbd {
    font-size: 11px;
    padding: 1px 5px;
    border: 1px solid currentColor;
    border-radius: 3px;
    opacity: .6;
  }

  .hint {
    color: var(--ink-muted);
    opacity: .7;
  }
  .hint .kbd {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    padding: 1px 6px;
    margin: 0 2px;
    border: 1px solid var(--ink-faint);
    border-radius: 3px;
    color: var(--ink-muted);
  }

  /* Results screen */
  .results {
    width: 100%;
    max-width: 820px;
    display: none;
    animation: rise .5s cubic-bezier(.2,.7,.2,1);
  }
  .results.on { display: block; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }
  .result-hero {
    display: flex;
    align-items: baseline;
    gap: 40px;
    padding-bottom: 34px;
    border-bottom: 1px solid var(--ink-faint);
    margin-bottom: 34px;
    flex-wrap: wrap;
  }
  .result-wpm {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(120px, 22vw, 220px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--ink);
    font-variant-numeric: lining-nums;
  }
  .result-wpm-lbl {
    font-family: var(--sans);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-muted);
    margin-left: -8px;
  }
  .result-side {
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink-muted);
    margin-left: auto;
  }
  .result-side .row { display: flex; justify-content: space-between; gap: 32px; }
  .result-side .row b {
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .fingerprint {
    margin-bottom: 40px;
  }
  .fp-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .fp-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
  }
  .fp-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-muted);
  }
  .fp-chart {
    height: 100px;
    display: flex;
    align-items: flex-end;
    gap: 1px;
    padding: 8px 0;
    border-top: 1px solid var(--ink-faint);
    border-bottom: 1px solid var(--ink-faint);
    overflow-x: auto;
  }
  .fp-bar {
    flex: 1 0 3px;
    min-width: 2px;
    background: var(--accent);
    border-radius: 1px 1px 0 0;
    opacity: 0.85;
    transition: height .3s cubic-bezier(.2,.7,.2,1);
  }
  .fp-bar.err { background: var(--error); }
  .fp-axis {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 6px;
  }

  .result-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: var(--paper); }

  footer {
    padding: 18px 40px 24px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-muted);
    opacity: .8;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Focus outline on the stage area */
  .stage:focus { outline: none; }

  @media (max-width: 640px) {
    header { padding: 20px; }
    main { padding: 10px 20px 40px; }
    .text-window { font-size: 18px; }
    .result-hero { gap: 20px; }
    .result-side { margin-left: 0; width: 100%; }
    .top-controls { gap: 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">typer<span class="dot">.</span><span class="cursor"></span></div>
  <div class="top-controls">
    <div class="duration" role="tablist" aria-label="Test duration">
      <button data-dur="15" role="tab">15s</button>
      <button data-dur="30" role="tab" class="active">30s</button>
      <button data-dur="60" role="tab">60s</button>
      <button data-dur="120" role="tab">120s</button>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">◐</button>
  </div>
</header>

<main>
  <section class="stage" id="stage" tabindex="0" aria-label="Typing test. Start typing to begin.">
    <div class="live-stats" id="liveStats">
      <div><span class="val" id="wpm">0</span>wpm</div>
      <div><span class="val" id="acc">100</span>% acc</div>
      <div><span class="val" id="time">30</span>s left</div>
    </div>
    <div class="text-window" id="win">
      <div class="text-flow" id="flow"></div>
    </div>
    <div class="controls-row">
      <button class="btn" id="restart">restart <span class="kbd">tab</span></button>
      <span class="hint">just start typing · <span class="kbd">esc</span> to reset</span>
    </div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="result-hero">
      <div>
        <div class="result-wpm" id="finalWpm">0</div>
        <div class="result-wpm-lbl">words per minute</div>
      </div>
      <div class="result-side">
        <div class="row"><span>accuracy</span><b id="finalAcc">—</b></div>
        <div class="row"><span>raw wpm</span><b id="finalRaw">—</b></div>
        <div class="row"><span>characters</span><b id="finalChars">—</b></div>
        <div class="row"><span>time</span><b id="finalTime">—</b></div>
        <div class="row"><span>consistency</span><b id="finalCons">—</b></div>
      </div>
    </div>
    <div class="fingerprint">
      <div class="fp-header">
        <div class="fp-title">your rhythm</div>
        <div class="fp-sub">each bar is one keystroke · height is the pause before it</div>
      </div>
      <div class="fp-chart" id="fpChart" aria-hidden="true"></div>
      <div class="fp-axis"><span>start</span><span>end</span></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="tryAgain">try again <span class="kbd">tab</span></button>
      <button class="btn" id="newText">new text</button>
    </div>
  </section>
</main>

<footer>
  typer · a minimalist typing test · <a href="https://github.com/akshanshkmr/typer">source</a>
</footer>

<script>
(() => {
  // Common English word list (top ~200 by frequency-ish, filtered for typeability)
  const WORDS = ("the be to of and a in that have i it for not on with he as you do at this but his by from they we say her she or an will my one all would there their what so up out if about who get which go me when make can like time no just him know take people into year your good some could them see other than then now look only come its over think also back after use two how our work first well way even new want because any these give day most us is are was were been being has had did does can could shall should may might must such very own same tell does even down where why way each need feel between while great through under here still both against last never keep small keep leave large next early few quite always different every found around always another told young public best around move too words house world life without place high hand still such once every through under against another world number without world life still much again both between own long same next best keep house together large open small great good young important early few public bad hand different every found always another told great through where why through even down back after come only over think also its").split(/\s+/);

  const DUR_KEY = 'typer.duration';
  const THEME_KEY = 'typer.theme';

  const $ = (id) => document.getElementById(id);
  const stage = $('stage');
  const flow = $('flow');
  const win = $('win');
  const liveStats = $('liveStats');
  const wpmEl = $('wpm');
  const accEl = $('acc');
  const timeEl = $('time');
  const results = $('results');
  const finalWpm = $('finalWpm');
  const finalAcc = $('finalAcc');
  const finalRaw = $('finalRaw');
  const finalChars = $('finalChars');
  const finalTime = $('finalTime');
  const finalCons = $('finalCons');
  const fpChart = $('fpChart');
  const restartBtn = $('restart');
  const tryAgainBtn = $('tryAgain');
  const newTextBtn = $('newText');
  const themeToggle = $('themeToggle');
  const durBtns = document.querySelectorAll('.duration button');

  let duration = parseInt(localStorage.getItem(DUR_KEY) || '30', 10);
  if (![15,30,60,120].includes(duration)) duration = 30;

  let state = null;

  function newPassage(n = 80) {
    const out = [];
    for (let i = 0; i < n; i++) out.push(WORDS[(Math.random() * WORDS.length) | 0]);
    return out;
  }

  function renderText(words) {
    flow.innerHTML = '';
    const frag = document.createDocumentFragment();
    words.forEach((w, wi) => {
      const wSpan = document.createElement('span');
      wSpan.className = 'word';
      wSpan.dataset.i = wi;
      for (const c of w) {
        const cs = document.createElement('span');
        cs.className = 'ch';
        cs.textContent = c;
        wSpan.appendChild(cs);
      }
      // trailing space as a typeable char
      const space = document.createElement('span');
      space.className = 'ch space';
      space.textContent = ' ';
      wSpan.appendChild(space);
      frag.appendChild(wSpan);
    });
    flow.appendChild(frag);
  }

  function reset(newText = true) {
    if (state && state.timer) clearInterval(state.timer);
    if (newText || !state) {
      const words = newPassage(120);
      renderText(words);
    }
    const chars = Array.from(flow.querySelectorAll('.ch'));
    state = {
      chars,
      idx: 0,
      started: false,
      startedAt: 0,
      endsAt: 0,
      typed: 0,        // total keystrokes (excluding backspace)
      correct: 0,      // correct chars currently in stream
      errors: 0,       // total mistyped chars (cumulative)
      intervals: [],   // ms between keystrokes
      hits: [],        // { t, ok } per keystroke
      lastT: 0,
      timer: null,
      done: false,
      duration,
    };
    flow.style.transform = 'translateY(0)';
    liveStats.classList.remove('on');
    results.classList.remove('on');
    stage.style.display = '';
    wpmEl.textContent = '0';
    accEl.textContent = '100';
    timeEl.textContent = String(duration);
    setCursor();
    stage.focus();
  }

  function setCursor() {
    document.querySelectorAll('.ch.cur').forEach(n => n.classList.remove('cur', 'after'));
    const cur = state.chars[state.idx];
    if (cur) cur.classList.add('cur');
    else {
      // past end — put cursor after last char
      const last = state.chars[state.chars.length - 1];
      if (last) last.classList.add('cur', 'after');
    }
    scrollToCursor();
  }

  function scrollToCursor() {
    const cur = state.chars[state.idx] || state.chars[state.chars.length - 1];
    if (!cur) return;
    const winRect = win.getBoundingClientRect();
    const curRect = cur.getBoundingClientRect();
    const flowRect = flow.getBoundingClientRect();
    // Line height in px
    const lineH = parseFloat(getComputedStyle(win).lineHeight);
    // Position of the cursor relative to the flow's current position
    const cursorTopInFlow = curRect.top - flowRect.top;
    // We want the cursor to stay on line 2 of 3 (index 1)
    const targetLine = 1;
    const desiredCursorTopInWin = targetLine * lineH;
    // How much to translate the flow
    const currentTranslate = getTranslateY(flow);
    const cursorTopInWin = curRect.top - winRect.top;
    const delta = cursorTopInWin - desiredCursorTopInWin;
    if (Math.abs(delta) > 4) {
      flow.style.transform = `translateY(${currentTranslate - delta}px)`;
    }
  }
  function getTranslateY(el) {
    const t = el.style.transform;
    const m = /translateY\((-?\d+\.?\d*)px\)/.exec(t);
    return m ? parseFloat(m[1]) : 0;
  }

  function start() {
    state.started = true;
    state.startedAt = performance.now();
    state.endsAt = state.startedAt + state.duration * 1000;
    state.lastT = state.startedAt;
    liveStats.classList.add('on');
    state.timer = setInterval(tick, 100);
  }

  function tick() {
    if (state.done) return;
    const now = performance.now();
    const remaining = Math.max(0, (state.endsAt - now) / 1000);
    timeEl.textContent = remaining.toFixed(remaining < 10 ? 1 : 0).replace(/\.0$/, '');
    updateLiveWpm(now);
    if (remaining <= 0) finish();
  }

  function updateLiveWpm(now = performance.now()) {
    const mins = (now - state.startedAt) / 60000;
    if (mins <= 0) return;
    const wpm = Math.round((state.correct / 5) / mins);
    const acc = state.typed === 0 ? 100 : Math.max(0, Math.round(100 * (state.typed - state.errors) / state.typed));
    wpmEl.textContent = String(Math.max(0, wpm));
    accEl.textContent = String(acc);
  }

  function stddev(arr) {
    if (arr.length < 2) return 0;
    const m = arr.reduce((a,b) => a+b, 0) / arr.length;
    const v = arr.reduce((a,b) => a + (b-m)*(b-m), 0) / arr.length;
    return Math.sqrt(v);
  }

  function finish() {
    if (state.done) return;
    state.done = true;
    clearInterval(state.timer);
    const now = performance.now();
    const elapsedSec = Math.min(state.duration, (now - state.startedAt) / 1000);
    const mins = elapsedSec / 60;
    const netWpm = mins > 0 ? Math.max(0, Math.round((state.correct / 5) / mins)) : 0;
    const rawWpm = mins > 0 ? Math.round((state.typed / 5) / mins) : 0;
    const acc = state.typed === 0 ? 0 : Math.round(100 * (state.typed - state.errors) / state.typed);
    finalWpm.textContent = String(netWpm);
    finalAcc.textContent = acc + '%';
    finalRaw.textContent = String(rawWpm);
    finalChars.textContent = state.typed + ' (' + state.errors + ' err)';
    finalTime.textContent = elapsedSec.toFixed(1) + 's';
    // Consistency = 100 - CV% of inter-key intervals, clamped
    const goodIntervals = state.intervals.filter(x => x > 0 && x < 2000);
    let cons = 0;
    if (goodIntervals.length > 4) {
      const mean = goodIntervals.reduce((a,b) => a+b, 0) / goodIntervals.length;
      const sd = stddev(goodIntervals);
      const cv = mean > 0 ? sd / mean : 1;
      cons = Math.max(0, Math.min(100, Math.round(100 * (1 - cv))));
    }
    finalCons.textContent = cons + '%';
    drawFingerprint();
    // Hide the stage, show results
    stage.style.display = 'none';
    results.classList.add('on');
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function drawFingerprint() {
    fpChart.innerHTML = '';
    const hits = state.hits;
    if (hits.length < 2) return;
    const intervals = [];
    for (let i = 1; i < hits.length; i++) intervals.push({ dt: hits[i].t - hits[i-1].t, ok: hits[i].ok });
    // Cap extreme pauses at 500ms so one thinking pause doesn't flatten the rest
    const cap = 500;
    const maxDt = Math.min(cap, Math.max(...intervals.map(i => Math.min(i.dt, cap))));
    const frag = document.createDocumentFragment();
    for (const it of intervals) {
      const d = document.createElement('div');
      d.className = 'fp-bar' + (it.ok ? '' : ' err');
      const h = Math.max(4, Math.round(100 * Math.min(it.dt, cap) / maxDt));
      d.style.height = h + '%';
      d.title = Math.round(it.dt) + 'ms' + (it.ok ? '' : ' · miss');
      frag.appendChild(d);
    }
    fpChart.appendChild(frag);
  }

  function handleChar(ch) {
    if (state.done) return;
    if (!state.started) start();
    const cur = state.chars[state.idx];
    if (!cur) return;
    const expected = cur.textContent;
    const now = performance.now();
    state.intervals.push(now - state.lastT);
    state.lastT = now;
    const ok = ch === expected;
    state.typed++;
    if (ok) {
      cur.classList.add('done');
      cur.classList.remove('bad');
      state.correct++;
    } else {
      cur.classList.add('bad');
      state.errors++;
    }
    state.hits.push({ t: now, ok });
    state.idx++;
    setCursor();
    updateLiveWpm();
    // Extend passage if user is fast
    if (state.idx > state.chars.length - 60) {
      const extra = newPassage(40);
      const before = state.chars.length;
      extra.forEach(w => {
        const wSpan = document.createElement('span');
        wSpan.className = 'word';
        for (const c of w) {
          const cs = document.createElement('span');
          cs.className = 'ch';
          cs.textContent = c;
          wSpan.appendChild(cs);
        }
        const space = document.createElement('span');
        space.className = 'ch space';
        space.textContent = ' ';
        wSpan.appendChild(space);
        flow.appendChild(wSpan);
      });
      state.chars = Array.from(flow.querySelectorAll('.ch'));
    }
    if (state.idx >= state.chars.length) finish();
  }

  function handleBackspace() {
    if (state.done || state.idx === 0) return;
    state.idx--;
    const cur = state.chars[state.idx];
    cur.classList.remove('done');
    if (cur.classList.contains('bad')) {
      cur.classList.remove('bad');
      // don't uncount the error — accuracy tracks total mistakes, not net
      state.correct = state.correct; // no-op, kept for clarity
    } else {
      state.correct = Math.max(0, state.correct - 1);
    }
    setCursor();
  }

  document.addEventListener('keydown', (e) => {
    // Global shortcuts first
    if (e.key === 'Tab') {
      e.preventDefault();
      reset(false);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      reset(true);
      return;
    }
    // If results are showing, only tab/esc do anything (handled above); enter = new run
    if (results.classList.contains('on')) {
      if (e.key === 'Enter') { e.preventDefault(); reset(true); }
      return;
    }
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === 'Backspace') { e.preventDefault(); handleBackspace(); return; }
    if (e.key.length === 1) {
      e.preventDefault();
      handleChar(e.key);
    }
  });

  // Duration switch
  durBtns.forEach(b => {
    if (parseInt(b.dataset.dur, 10) === duration) b.classList.add('active');
    else b.classList.remove('active');
    b.addEventListener('click', () => {
      duration = parseInt(b.dataset.dur, 10);
      localStorage.setItem(DUR_KEY, String(duration));
      durBtns.forEach(x => x.classList.toggle('active', x === b));
      reset(true);
    });
  });

  restartBtn.addEventListener('click', () => reset(false));
  tryAgainBtn.addEventListener('click', () => reset(true));
  newTextBtn.addEventListener('click', () => reset(true));

  // Theme toggle
  function applyTheme(mode) {
    if (mode === 'auto') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', mode);
    localStorage.setItem(THEME_KEY, mode);
  }
  applyTheme(localStorage.getItem(THEME_KEY) || 'auto');
  themeToggle.addEventListener('click', () => {
    const cur = localStorage.getItem(THEME_KEY) || 'auto';
    const next = cur === 'auto' ? 'dark' : cur === 'dark' ? 'light' : 'auto';
    applyTheme(next);
  });

  // Keep focus on the stage when window regains focus
  window.addEventListener('focus', () => stage.focus());
  stage.addEventListener('click', () => stage.focus());

  // Init
  reset(true);
  stage.focus();

  // ponytail: minimal self-check runs only when ?test=1 — keeps prod page silent.
  if (location.search.includes('test=1')) {
    console.assert(WORDS.length > 50, 'word list too small');
    const before = state.idx;
    handleChar(state.chars[0].textContent);
    console.assert(state.idx === before + 1, 'idx should advance after keystroke');
    handleBackspace();
    console.assert(state.idx === before, 'idx should retreat after backspace');
    console.log('typer self-check: ok');
    reset(true);
  }
})();
</script>
</body>
</html>
